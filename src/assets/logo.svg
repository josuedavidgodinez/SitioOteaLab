<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 130" fill="none" role="img" aria-label="Otea Lab logo">
  <!-- Scan beams emanating from lens -->
  <line x1="60" y1="34" x2="14" y2="6" stroke="#0EA5E9" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="3 3" opacity="0.45"/>
  <line x1="60" y1="34" x2="106" y2="6" stroke="#0EA5E9" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="3 3" opacity="0.45"/>
  <line x1="60" y1="34" x2="6" y2="50" stroke="#0EA5E9" stroke-width="1" stroke-linecap="round" stroke-dasharray="2 4" opacity="0.22"/>
  <line x1="60" y1="34" x2="114" y2="50" stroke="#0EA5E9" stroke-width="1" stroke-linecap="round" stroke-dasharray="2 4" opacity="0.22"/>

  <!-- Antenna -->
  <line x1="60" y1="20" x2="60" y2="9" stroke="#1E40AF" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="60" cy="7" r="3" fill="#0EA5E9"/>
  <circle cx="60" cy="7" r="1.2" fill="#E0F2FE"/>

  <!-- Observation deck -->
  <rect x="22" y="20" width="76" height="30" rx="6" fill="#1E40AF"/>

  <!-- Lens ring (glow effect) -->
  <circle cx="60" cy="35" r="12" fill="#0EA5E9" opacity="0.15"/>
  <!-- Lens outer -->
  <circle cx="60" cy="35" r="9" fill="#1D4ED8"/>
  <!-- Lens glass -->
  <circle cx="60" cy="35" r="6.5" fill="#0EA5E9"/>
  <!-- Lens highlight -->
  <circle cx="60" cy="35" r="2.8" fill="#E0F2FE"/>
  <circle cx="63" cy="32" r="1.1" fill="white" opacity="0.7"/>

  <!-- Deck detail lines -->
  <line x1="22" y1="38" x2="48" y2="38" stroke="#0EA5E9" stroke-width="0.6" opacity="0.3"/>
  <line x1="72" y1="38" x2="98" y2="38" stroke="#0EA5E9" stroke-width="0.6" opacity="0.3"/>

  <!-- Tower body (tapered) -->
  <path d="M44 50 L40 98 L80 98 L76 50 Z" fill="#1E40AF"/>

  <!-- Digital grid lines on tower -->
  <line x1="41" y1="64" x2="79" y2="64" stroke="#0EA5E9" stroke-width="0.7" opacity="0.3"/>
  <line x1="40" y1="79" x2="80" y2="79" stroke="#0EA5E9" stroke-width="0.7" opacity="0.3"/>
  <line x1="60" y1="50" x2="60" y2="98" stroke="#0EA5E9" stroke-width="0.7" opacity="0.2"/>

  <!-- Pixel dots — upper row -->
  <rect x="50" y="56" width="4" height="4" rx="1" fill="#0EA5E9" opacity="0.65"/>
  <rect x="58" y="56" width="4" height="4" rx="1" fill="#0EA5E9" opacity="0.5"/>
  <rect x="66" y="56" width="4" height="4" rx="1" fill="#0EA5E9" opacity="0.65"/>

  <!-- Pixel dots — mid row -->
  <rect x="50" y="70" width="4" height="4" rx="1" fill="#0EA5E9" opacity="0.4"/>
  <rect x="58" y="70" width="4" height="4" rx="1" fill="#0EA5E9" opacity="0.55"/>
  <rect x="66" y="70" width="4" height="4" rx="1" fill="#0EA5E9" opacity="0.4"/>

  <!-- Pixel dots — lower row -->
  <rect x="51" y="84" width="4" height="4" rx="1" fill="#0EA5E9" opacity="0.25"/>
  <rect x="59" y="84" width="4" height="4" rx="1" fill="#0EA5E9" opacity="0.35"/>
  <rect x="67" y="84" width="4" height="4" rx="1" fill="#0EA5E9" opacity="0.25"/>

  <!-- Base platform -->
  <rect x="33" y="98" width="54" height="10" rx="3" fill="#1E3A8A"/>
  <!-- Base ground line -->
  <rect x="24" y="107" width="72" height="5" rx="2.5" fill="#172554"/>
</svg>
